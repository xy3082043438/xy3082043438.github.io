<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>获取当前位置信息</title>
<script>
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(showPosition, showError);
  } else {
    document.getElementById("address").innerHTML = "您的浏览器不支持获取地理位置信息。";
  }
}

function showPosition(position) {
  var latitude = position.coords.latitude;
  var longitude = position.coords.longitude;
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=" + latitude + "&lon=" + longitude, true);
  xhr.onload = function() {
    if (xhr.status >= 200 && xhr.status < 300) {
      var data = JSON.parse(xhr.responseText);
      document.getElementById("address").innerHTML = "地址: " + data.display_name;
    } else {
      document.getElementById("address").innerHTML = "无法获取地址信息。";
    }
  };
  xhr.send();
}

function showError(error) {
  switch(error.code) {
    case error.PERMISSION_DENIED:
      document.getElementById("address").innerHTML = "用户拒绝提供地理位置信息。";
      break;
    case error.POSITION_UNAVAILABLE:
      document.getElementById("address").innerHTML = "位置信息不可用。";
      break;
    case error.TIMEOUT:
      document.getElementById("address").innerHTML = "获取位置信息超时。";
      break;
    case error.UNKNOWN_ERROR:
      document.getElementById("address").innerHTML = "发生未知错误。";
      break;
  }
}
</script>
</head>
<body onload="getLocation()">

<h1>当前位置信息</h1>
<div id="address"></div>

</body>
</html>
