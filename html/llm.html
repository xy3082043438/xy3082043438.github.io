<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智趣易得 - AI 聊天助手</title>
  <link rel="stylesheet" href="../css/llm.css">
</head>

<body>
  <div class="chat-container">
    <div class="sidebar">
      <div class="logo">智趣易得</div>
      <button class="new-chat">新建对话</button>
      <div class="chat-list">
        <div class="chat-item active">优化神经网络</div>
        <div class="chat-item">如何提升机器学习模型的性能？</div>
        <div class="chat-item">深度学习与传统机器学习方法的对比</div>
      </div>
    </div>
    <div class="chat-window">
      <div class="chat-header">
        <h1>你好，我是智趣易得助手</h1>
        <p>我是由智趣易得团队开发的虚拟AI产品，致力于帮助用户解决学习中的问题，保证学习过程中的疑惑能够得到及时解决。</p>
      </div>
      <div class="chat-body">
        <div class="chat-message user-message">请问如何优化神经网络？</div>
        <div class="chat-message bot-message">你可以尝试调整学习率、增加训练数据、使用正则化技术等。</div>
      </div>
      <div class="chat-input">
        <input type="text" placeholder="请输入你的问题...">
        <button type="button">发送</button>
      </div>
    </div>
  </div>
  <script src="../js/llm.js"></script>
</body>

</html>
