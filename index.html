<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/index.css">
  <title>智趣易得</title>
</head>

<body>
  <div class="header">
    <div class="logo">
      <img src="./img/logo.png" alt="logo">
    </div>
    <div class="search-container">
      <input type="text" placeholder="搜索...">
      <button type="button">搜索</button>
    </div>
    <div class="user">
      <img src="./img/user.webp" alt="用户头像">
      <p>扬扬</p>
    </div>
  </div>


  <div class="navbar">
    <a href="#">首页</a>
    <a href="#primary" class="active">小学</a>
    <a href="#middle">初中</a>
    <a href="#high">高中</a>
    <a href="#university">大学</a>
  </div>

  <div class="course-container" id="course-container">
    <!-- 课程项将由JavaScript插入 -->
  </div>

  <div class="extra-section">
    <div class="extra-item">
      <a href="#"><img src="./img/小游戏.png" alt="小游戏"></a>
      <h4>小游戏</h4>
      <p>趣味十足的小游戏</p>
    </div>
    <div class="extra-item">
      <a href="#"><img src="./img/实验室管理.png" alt="实验室"></a>
      <h4>实验室</h4>
      <p>动手实践的实验室</p>
    </div>
    <div class="extra-item">
      <a href="#"><img src="./img/论坛.png" alt="论坛"></a>
      <h4>论坛</h4>
      <p>互动交流的论坛</p>
    </div>
    <div class="extra-item">
      <a href="#"><img src="./img/专业咨询.png" alt="专业资讯"></a>
      <h4>专业资讯</h4>
      <p>最新的专业资讯</p>
    </div>
  </div>

  <script src="./js/index.js"></script>

</body>

</html>
