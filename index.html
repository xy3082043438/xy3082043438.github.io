<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }

    a {
      margin: 20px auto;
      display: block;
      width: 200px;
      height: 60px;
      line-height: 60px;
      text-align: center;
      background-color: #007bff;
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      transition: background-color 0.3s ease;
    }

    a:hover {
      background-color: #0056b3;
    }

    #app {
      max-width: 600px;
      margin: 0 auto;
    }

    input[type="text"] {
      width: calc(100% - 150px);
      padding: 10px;
      margin: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      width: 80px;
      height: 40px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      background-color: #28a745;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #218838;
    }
  </style>
</head>
<body>
  <a href="http://47.120.50.212:5244">留言板</a>
  <br>
  <div id="app">
    <input type="text" v-model="message">
    <button @click="search">搜索</button>
  </div>
</body>
<script> 
  const { createApp } = Vue;
  const app = createApp({
    data() {
      return {
        message: ''
      }
    },
    methods: {
      search() {
        if (this.message) {
          window.location.href = `http://cn.bing.com/search?q=${encodeURIComponent(this.message)}`;
        }
      }
    }
  });
  app.mount('#app');
</script>
</html>
