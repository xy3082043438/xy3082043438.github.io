<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人工智能科普网站</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      background-color: #f4f7f6;
    }

    .navbar {
      background-color: #002b36;
      overflow: hidden;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
    }

    .navbar a {
      float: left;
      display: block;
      color: #ffffff;
      text-align: center;
      padding: 14px 20px;
      text-decoration: none;
    }

    .navbar a.active {
      background-color: #268bd2;
      color: white;
    }

    .navbar a:hover {
      background-color: #006d7f;
      color: white;
    }

    .navbar .search-container {
      float: right;
    }

    .navbar input[type=text] {
      padding: 6px;
      margin-top: 8px;
      margin-right: 16px;
      font-size: 17px;
      border: none;
    }

    .navbar .search-container button {
      float: right;
      padding: 6px 10px;
      margin-top: 8px;
      margin-right: 16px;
      background: #268bd2;
      color: white;
      font-size: 17px;
      border: none;
      cursor: pointer;
    }

    .navbar .search-container button:hover {
      background: #006d7f;
    }

    .course-container {
      display: flex;
      flex-wrap: wrap;
      padding: 20px;
      justify-content: space-between;
    }

    .course {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 16px;
      margin: 16px;
      width: calc(25% - 32px);
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
      transition: 0.3s;
      background-color: white;
    }

    .course:hover {
      box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
    }

    .course img {
      width: 100%;
      border-radius: 4px;
    }

    .course h3 {
      margin: 0 0 16px;
      color: #002b36;
    }

    .course p {
      color: #586e75;
    }

    .extra-section {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background-color: white;
      margin: 20px 16px;
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }

    .extra-item {
      text-align: center;
      width: calc(20% - 10px);
    }

    .extra-item img {
      width: 50px;
      height: 50px;
    }

    .extra-item h4 {
      margin: 10px 0 0;
      color: #002b36;
    }

    .extra-item p {
      margin: 5px 0 0;
      color: #586e75;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <a href="#primary" class="active">小学</a>
    <a href="#middle">初中</a>
    <a href="#high">高中</a>
    <a href="#university">大学</a>
    <div class="search-container">
      <input type="text" placeholder="搜索...">
      <button type="button">搜索</button>
    </div>
  </div>

  <div class="course-container" id="course-container">
    <!-- 课程项将由JavaScript插入 -->
  </div>

  <div class="extra-section">
    <div class="extra-item">
      <img src="./img/小游戏.png" alt="小游戏">
      <h4>小游戏</h4>
      <p>趣味十足的小游戏</p>
    </div>
    <div class="extra-item">
      <img src="./img/实验室管理.png" alt="实验室">
      <h4>实验室</h4>
      <p>动手实践的实验室</p>
    </div>
    <div class="extra-item">
      <img src="./img/论坛.png" alt="论坛">
      <h4>论坛</h4>
      <p>互动交流的论坛</p>
    </div>
    <div class="extra-item">
      <img src="./img/专业咨询.png" alt="专业资讯">
      <h4>专业资讯</h4>
      <p>最新的专业资讯</p>
    </div>
  </div>

  <script>
    // 课程数据示例
    const courses = [
      { title: "人工智能入门", img: "https://via.placeholder.com/150", description: "适合小学学生的人工智能基础课程", category: "primary" },
      { title: "机器学习基础", img: "https://via.placeholder.com/150", description: "适合小学学生的机器学习入门课程", category: "primary" },
      { title: "Python编程", img: "https://via.placeholder.com/150", description: "适合小学学生的Python编程课程", category: "primary" },
      { title: "数据科学基础", img: "https://via.placeholder.com/150", description: "适合初中学生的数据科学入门课程", category: "middle" },
      { title: "深度学习基础", img: "https://via.placeholder.com/150", description: "适合高中学生的深度学习基础课程", category: "high" },
      { title: "高级机器学习", img: "https://via.placeholder.com/150", description: "适合大学学生的高级机器学习课程", category: "university" },
      // 添加更多课程项
    ];

    // 获取课程容器
    const courseContainer = document.getElementById('course-container');

    // 显示默认分类的小学课程
    const showCourses = (category) => {
      courseContainer.innerHTML = '';
      const filteredCourses = courses.filter(course => course.category === category);
      filteredCourses.forEach(course => {
        const courseElement = document.createElement('div');
        courseElement.classList.add('course');
        courseElement.innerHTML = `
          <img src="${course.img}" alt="${course.title}">
          <h3>${course.title}</h3>
          <p>${course.description}</p>
        `;
        courseContainer.appendChild(courseElement);
      });
    };

    // 默认显示小学课程
    showCourses('primary');

    // 添加导航栏点击事件
    const navbarLinks = document.querySelectorAll('.navbar a');
    navbarLinks.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        // 移除其他链接的active类
        navbarLinks.forEach(navLink => navLink.classList.remove('active'));
        // 为当前点击的链接添加active类
        e.target.classList.add('active');
        // 显示相应的课程
        const category = e.target.getAttribute('href').substring(1);
        showCourses(category);
      });
    });
  </script>

</body>

</html>
